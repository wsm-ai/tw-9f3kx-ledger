<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="300" fill="#1a1714"/>

  <text x="120" y="44" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">THE GLYPH</text>
  <text x="340" y="44" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">BROKEN BY DEATH</text>
  <text x="560" y="44" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">KEPT THOUGH GONE</text>

  <g stroke="#c98b4b" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="120" cy="145" r="34"/>
    <line x1="64" y1="145" x2="176" y2="145"/>
  </g>
  <text x="120" y="225" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="12">coin · sun · horizon</text>
  <text x="120" y="245" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">the passage paid</text>

  <g stroke="#a6584f" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="340" cy="145" r="34"/>
    <line x1="284" y1="145" x2="396" y2="145"/>
    <line x1="300" y1="183" x2="380" y2="107" stroke-width="4"/>
  </g>
  <text x="340" y="225" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="12">death glyph + slash</text>
  <text x="340" y="245" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">could not be kept</text>

  <g stroke="#6f8f6a" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="560" cy="145" r="34"/>
    <line x1="504" y1="145" x2="616" y2="145"/>
    <circle cx="560" cy="145" r="48" stroke-width="2.5"/>
  </g>
  <text x="560" y="225" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="12">death glyph + ring</text>
  <text x="560" y="245" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">honored, though gone</text>

  <line x1="40" y1="270" x2="640" y2="270" stroke="#c9bca3" stroke-width="0.5" opacity="0.4"/>
  <text x="340" y="290" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">one circle, one line — scribe the circle, strike the horizon through it</text>
</svg>
