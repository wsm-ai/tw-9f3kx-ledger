<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="240" fill="#1a1714"/>
  <!-- Ring centered (100,100) r=38. Gap at the BOTTOM.
       Endpoints on the circle at ~35deg from straight down:
       x = 100 +/- 38*sin35 = 100 +/- 21.8 ; y = 100 + 38*cos35 = 131.1 -->
  <g stroke="#c98b4b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M78.2 131.1 A38 38 0 1 1 121.8 131.1"/>
    <path d="M78.2 131.1 q-7 7 -10 13"/>
    <path d="M121.8 131.1 q7 7 10 13"/>
  </g>
  <text x="100" y="106" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="19" letter-spacing="1">M-001</text>
  <text x="100" y="190" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="13">the ring left open</text>
  <text x="100" y="212" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="12">your hand · you let it fall</text>
</svg>
