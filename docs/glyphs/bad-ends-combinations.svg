<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="300" fill="#1a1714"/>

  <text x="120" y="40" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">DEATH</text>
  <text x="340" y="40" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">TAKEN</text>
  <text x="560" y="40" text-anchor="middle" fill="#c9a24b" font-family="monospace" font-size="13" letter-spacing="2">ABANDONED</text>

  <!-- DEATH: whole circle crossed by the horizon -->
  <g stroke="#c98b4b" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="120" cy="130" r="34"/>
    <line x1="74" y1="130" x2="166" y2="130"/>
  </g>
  <text x="120" y="208" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="11">the passage</text>
  <text x="120" y="227" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="10">they are gone · not your fault</text>

  <!-- TAKEN: ring open on the side, breached by an external stroke -->
  <g stroke="#c98b4b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M359.4 149.5 A34 34 0 1 1 359.4 110.5"/>
  </g>
  <g stroke="#a6584f" stroke-width="3.5" fill="none" stroke-linecap="round">
    <line x1="404" y1="130" x2="352" y2="130"/>
    <path d="M404 130 l9 -4 M404 130 l9 4"/>
  </g>
  <text x="340" y="208" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="11">the ring breached</text>
  <text x="340" y="227" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="10">another's hand · taken from you</text>

  <!-- ABANDONED: ring open at the bottom, ends splayed (wound) -->
  <g stroke="#c98b4b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M540.5 159.5 A34 34 0 1 1 579.5 159.5"/>
    <path d="M540.5 159.5 q-6 6 -9 11"/>
    <path d="M579.5 159.5 q6 6 9 11"/>
  </g>
  <text x="560" y="208" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="11">the ring left open</text>
  <text x="560" y="227" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="10">your hand · you let it fall</text>

  <line x1="40" y1="252" x2="640" y2="252" stroke="#c9bca3" stroke-width="0.5" opacity="0.4"/>
  <text x="340" y="276" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">three bad ends — gone, taken, abandoned. the front carries the fate; the back's sigil is scored only when you failed it.</text>
</svg>
