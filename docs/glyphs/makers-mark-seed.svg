  </g>

  <text x="180" y="320" text-anchor="middle" fill="#ddd2bf" font-family="monospace" font-size="12">SEED — the central winding is the S</text>
  <text x="180" y="340" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">snake coils into a turning at each end</text>
  <text x="180" y="358" text-anchor="middle" fill="#8c8273" font-family="monospace" font-size="11">true the S-line by hand</text>
