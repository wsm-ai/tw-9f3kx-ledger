<svg viewBox="0 0 360 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="380" fill="#1a1714"/>

  <g stroke="#c9a24b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="180" cy="180" r="104" stroke-width="2"/>

    <line x1="180" y1="78" x2="180" y2="282"/>

    <path d="M180 108
             a22 22 0 1 1 -0.2 0
             M180 130
             q36 24 0 50
             q-36 24 0 50
             M180 230
             a22 22 0 1 0 0.2 0" stroke-width="3"/>

    <line x1="156" y1="146" x2="204" y2="146" stroke-width="2"/>
    <line x1="154" y1="180" x2="206" y2="180" stroke-width="2"/>
